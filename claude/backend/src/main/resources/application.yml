spring:
  application:
    name: ecommerce-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ecommerce}
    username: ${SPRING_DATASOURCE_USERNAME:ecommerce}
    password: ${SPRING_DATASOURCE_PASSWORD:ecommerce}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
    show-sql: false

server:
  port: ${SERVER_PORT:8080}

app:
  security:
    jwt:
      # Chave HMAC-SHA256 (base64). Sobrescreva via APP_SECURITY_JWT_SECRET em producao.
      secret: ${APP_SECURITY_JWT_SECRET:Y2hhbmdlLW1lLXN1cGVyLXNlY3JldC1rZXktZm9yLWVjb21tZXJjZS1kZW1vLTEyMw==}
      # Tempo de expiracao do token em minutos
      expiration-minutes: ${APP_SECURITY_JWT_EXPIRATION_MINUTES:120}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  seed:
    enabled: ${APP_SEED_ENABLED:true}

logging:
  level:
    org.springframework.security: INFO

---
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:ecommerce;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
