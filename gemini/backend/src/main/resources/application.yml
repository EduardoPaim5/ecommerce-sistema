server:
  port: 8080
  servlet:
    context-path: /api

spring:
  profiles:
    active: dev # Default profile is dev (H2)

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:ecommercedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://db:5432/ecommercedb
    driver-class-name: org.postgresql.Driver
    username: ecommerce_user
    password: ecommerce_password
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false

jwt:
  secret: 9a4f2c5d3b6f8e1a2c5d8e2f1a6c8e9d0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8
  expiration: 86400000 # 1 day in milliseconds
